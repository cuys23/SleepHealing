

services:
  app:
    build: ./admin
    ports:
      - "9080:8000"
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:9080
      FILESYSTEM_DISK: public
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: maditam
      DB_USERNAME: maditam
      DB_PASSWORD: ${DB_PASSWORD}
      DEMO_USER: admin@example.com
      DEMO_PASS: secret
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/storage
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: maditam
      MYSQL_USER: maditam
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "maditam", "-p${DB_PASSWORD}"]
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
  app_storage:
