name: medyo
description: A new Flutter project.

publish_to: "none"

version: 2.0.2+24

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_screenutil: ^5.9.3
  freezed_annotation: ^2.2.0
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  hive_flutter: ^1.1.0
  page_transition: ^2.0.9
  flutter_easyloading: ^3.0.5
  flutter_riverpod: ^2.5.1
  flutter_svg: ^2.0.10
  flutter_form_builder: ^10.2.0
  # form_builder_validators: ^9.1.0
  sliding_up_panel: ^2.0.0+1
  audio_service: ^0.18.15
  just_audio: ^0.9.30
  cached_network_image: ^3.2.1
  image_picker: ^1.1.2
  # pin_code_fields: ^7.4.0
  # flutter_launch: ^0.3.0
  url_launcher: ^6.1.7
  flutter_html: ^3.0.0-alpha.5
  text_scroll: ^0.2.0
  google_mobile_ads: ^5.1.0
  audioplayers: ^6.1.0
  share_plus: ^10.0.0
  firebase_core: ^3.4.0
  # firebase_messaging: ^14.4.0
  flutter_local_notifications: ^17.2.2
  easy_localization: ^3.0.1
  form_builder_validators: ^11.2.0
  pin_code_fields: ^8.0.1
  firebase_messaging: ^15.1.3
  change_app_package_name: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  freezed: ^2.5.7
  flutter_launcher_icons: ^0.13.1

# dependency_overrides:
#   win32: ^5.5.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/svgs/
    - assets/branding/
    - assets/sounds/
    - assets/translations/
    - assets/sounds/birds-in-the-morning-24147.mp3

  fonts:
    - family: Open Sans
      fonts:
        - asset: assets/fonts/OpenSans-Light.ttf
          weight: 300
        - asset: assets/fonts/OpenSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/OpenSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/OpenSans-Italic.ttf
          style: italic
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Light.ttf
          weight: 300
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 300
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 800
        - asset: assets/fonts/PlusJakartaSans-Italic-Variable.ttf
          weight: 400
          style: italic

flutter_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon.png"
